name: Build Notepad Next

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

env:
  QT_RELEASE_VER: 6.5
  # Paksa Node.js 24 runtime — warning tetap muncul tapi build aman
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:

          # ─── Linux ────────────────────────────────────────────────────
          - runs_on: ubuntu-24.04
            platform: linux
            qt_version: "6.5"
          - runs_on: ubuntu-24.04
            platform: linux
            qt_version: "6.8"
          - runs_on: ubuntu-24.04
            platform: linux
            qt_version: "6.10"

          # ─── Windows ──────────────────────────────────────────────────
          - runs_on: windows-latest
            platform: windows
            qt_version: "6.5"
          - runs_on: windows-latest
            platform: windows
            qt_version: "6.8"
          - runs_on: windows-latest
            platform: windows
            qt_version: "6.10"

          # ─── macOS Intel (macos-13 dihapus Des 2025 → macos-15-intel) ─
          - runs_on: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.5"
          - runs_on: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.8"
          - runs_on: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.10"

          # ─── macOS Apple Silicon ───────────────────────────────────────
          - runs_on: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.5"
          - runs_on: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.8"
          - runs_on: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.10"

    runs-on: ${{ matrix.runs_on }}

    steps:
      # actions/checkout v6.0.2 (Node.js 24, Maret 2026) — versi terbaru
      - name: Checkout Repository
        uses: actions/checkout@v6

      # ─── Install Qt ────────────────────────────────────────────────────
      # jurplel/install-qt-action@v4 masih Node.js 20 — warning tidak bisa dihindari
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true sudah menangani runtime-nya
      - name: Install Qt (mac)
        if: matrix.platform == 'mac'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          host: mac
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qt5compat'
          cache: true

      - name: Install Qt (linux/windows)
        if: matrix.platform != 'mac'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          modules: 'qt5compat'
          cache: true

      # ─── Windows Tools ─────────────────────────────────────────────────
      - name: Setup Visual Studio Tools
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Install NSIS
        if: runner.os == 'Windows'
        uses: repolevedavaj/install-nsis@v1.1.0
        with:
          nsis-version: '3.11'

      # ─── Linux Dependencies ────────────────────────────────────────────
      - name: Setup Linux (dependencies)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          echo "DISTRIBUTION=AppImage" >> "$GITHUB_ENV"
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-0 fuse \
            libxcb-cursor-dev libcups2-dev

      # ─── Set DISTRIBUTION ──────────────────────────────────────────────
      - name: Set Distribution (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: echo "DISTRIBUTION=Installer" >> "$GITHUB_ENV"

      - name: Set Distribution (mac)
        if: matrix.platform == 'mac'
        shell: bash
        run: echo "DISTRIBUTION=dmg" >> "$GITHUB_ENV"

      # ─── CMake Configure ───────────────────────────────────────────────
      - name: Configure (CMake)
        shell: bash
        run: |
          echo "Configure: run=$GITHUB_RUN_ID runner=${{ matrix.runs_on }} qt=${{ matrix.qt_version }}"
          CMAKE_OPTS="-S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPP_DISTRIBUTION=${{ env.DISTRIBUTION }}"

          if [ "${{ matrix.platform }}" = "mac" ]; then
            CMAKE_OPTS="$CMAKE_OPTS -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }}"
          fi

          echo "CMake options: $CMAKE_OPTS"
          cmake $CMAKE_OPTS

      # ─── Build ─────────────────────────────────────────────────────────
      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Build Windows Targets
        if: runner.os == 'Windows'
        shell: bash
        run: cmake --build build --target package zip installer --parallel

      - name: Build MacOS Targets (dmg)
        if: matrix.platform == 'mac'
        shell: bash
        run: cmake --build build --target dmg --parallel

      - name: Build Linux Targets (AppImage)
        if: matrix.platform == 'linux'
        shell: bash
        run: cmake --build build --target appimage --parallel

      # ─── Upload Artifacts ──────────────────────────────────────────────
      # upload-artifact v4.6.2 adalah Latest — tidak ada v5 — warning tidak bisa dihindari
      - name: Upload Windows zip Package
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadNext-Windows-Qt${{ matrix.qt_version }}-Zip
          path: build/package/
          if-no-files-found: warn

      - name: Upload Windows Installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadNext-Windows-Qt${{ matrix.qt_version }}-Installer
          path: installer/NotepadNext*.exe
          if-no-files-found: warn

      - name: Upload MacOS dmg
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadNext-macOS-${{ matrix.arch }}-Qt${{ matrix.qt_version }}
          path: build/NotepadNext*.dmg
          if-no-files-found: warn

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: NotepadNext-Linux-Qt${{ matrix.qt_version }}-AppImage
          path: build/NotepadNext*.AppImage
          if-no-files-found: warn

  # ─── GitHub Release Draft ──────────────────────────────────────────────
  github:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      github.repository == 'alsyundawy/NotepadNext' &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Create Draft Release
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload Windows Installer
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "NotepadNext-Windows-Qt${QT_RELEASE_VER}-Installer/NotepadNext-${{ github.ref_name }}-Installer.exe" \
            || true

      - name: Upload Windows Zip
        shell: bash
        run: |
          DIR="NotepadNext-Windows-Qt${QT_RELEASE_VER}-Zip"
          if [ -d "$DIR" ]; then
            cd "$DIR"
            zip -r "../NotepadNext-${{ github.ref_name }}-win64.zip" .
            cd ..
            gh release upload "${{ github.ref_name }}" \
              "NotepadNext-${{ github.ref_name }}-win64.zip" || true
          fi

      - name: Upload Linux AppImage
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "NotepadNext-Linux-Qt${QT_RELEASE_VER}-AppImage/NotepadNext-${{ github.ref_name }}-x86_64.AppImage" \
            || true

      - name: Upload macOS App (Intel x64)
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "NotepadNext-macOS-x64-Qt${QT_RELEASE_VER}/NotepadNext-${{ github.ref_name }}.dmg" \
            || true

      - name: Upload macOS App (Apple Silicon arm64)
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "NotepadNext-macOS-arm64-Qt${QT_RELEASE_VER}/NotepadNext-${{ github.ref_name }}.dmg" \
            || true

  # ─── Debug Job ─────────────────────────────────────────────────────────
  debug-mac-runner:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    steps:
      - name: Debug runner info
        shell: bash
        run: |
          echo "Runner: $RUNNER_NAME"
          uname -a && uname -m
          sw_vers || true
