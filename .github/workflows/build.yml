name: Build Notepad Next

on:
  workflow_dispatch: 
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:

env:
  QT_RELEASE_VER: 6.5

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-2022
            platform: windows
            qt_version: "6.5"

          - os: windows-2022
            platform: windows
            qt_version: "6.8"

          - os: windows-2022
            platform: windows
            qt_version: "6.10"

          # Linux
          - os: ubuntu-24.04
            platform: linux
            qt_version: "6.5"

          - os: ubuntu-24.04
            platform: linux
            qt_version: "6.8"

          - os: ubuntu-24.04
            platform: linux
            qt_version: "6.10"

          # macOS Intel
          - os: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.5"
            deployment_target: "11.0"

          - os: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.8"
            deployment_target: "12.0"

          - os: macos-15-intel
            platform: mac
            arch: x64
            cmake_arch: x86_64
            qt_arch: clang_64
            qt_version: "6.10"
            deployment_target: "13.0"

          # macOS Apple Silicon
          - os: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.5"
            deployment_target: "11.0"

          - os: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.8"
            deployment_target: "12.0"

          - os: macos-latest
            platform: mac
            arch: arm64
            cmake_arch: arm64
            qt_arch: clang_64
            qt_version: "6.10"
            deployment_target: "13.0"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          modules: 'qt5compat'
          cache: true

      - name: Setup Visual Studio Tools
        if: matrix.platform == 'windows'
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Install NSIS
        if: matrix.platform == 'windows'
        uses: repolevedavaj/install-nsis@v1.2.1
        with:
          nsis-version: '3.11'

      - name: Setup Linux
        if: matrix.platform == 'linux'
        run: |
          echo "DISTRIBUTION=AppImage" >> "$GITHUB_ENV"

          # Qt 6.10+ renamed wayland plugins
          if [[ "${{ matrix.qt_version }}" == "6.10" ]]; then
            echo "EXTRA_PLATFORM_PLUGINS=libqwayland.so" >> "$GITHUB_ENV"
          else
            echo "EXTRA_PLATFORM_PLUGINS=libqwayland-generic.so" >> "$GITHUB_ENV"
          fi

          sudo apt-get install libxkbcommon-dev libxkbcommon-x11-0 fuse libxcb-cursor-dev libcups2-dev

      - name: Setup macOS
        if: matrix.platform == 'mac'
        run: |
          echo "DISTRIBUTION=dmg" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          CMAKE_OPTS="-S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DAPP_DISTRIBUTION=${{ env.DISTRIBUTION }}"
          if [ "${{ matrix.platform }}" = "mac" ]; then
            CMAKE_OPTS="$CMAKE_OPTS -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}"
          fi
          cmake $CMAKE_OPTS

      - name: Build
        run: cmake --build build --parallel

      - name: Build Windows Targets
        if: matrix.platform == 'windows'
        run: cmake --build build --target package zip installer --parallel

      - name: Build MacOS Targets
        if: matrix.platform == 'mac'
        run: cmake --build build --target dmg --parallel

      - name: Build Linux Targets
        if: matrix.platform == 'linux'
        run: cmake --build build --target appimage --parallel

      - name: Upload Windows zip Package
        uses: actions/upload-artifact@v7
        if: matrix.platform == 'windows'
        with:
          name: NotepadNext-Windows-Qt${{ matrix.qt_version }}-Zip
          path: ${{ github.workspace }}/build/package/

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        if: matrix.platform == 'windows'
        with:
          name: NotepadNext-Windows-Qt${{ matrix.qt_version }}-Installer
          path: ${{ github.workspace }}/installer/NotepadNext*.exe

      - name: Upload MacOS dmg
        uses: actions/upload-artifact@v7
        if: matrix.platform == 'mac'
        with:
          name: NotepadNext-macOS-${{ matrix.arch }}-Qt${{ matrix.qt_version }}
          path: ${{ github.workspace }}/build/NotepadNext*.dmg

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        if: matrix.platform == 'linux'
        with:
          name: NotepadNext-Linux-Qt${{ matrix.qt_version }}-AppImage
          path: ${{ github.workspace }}/build/NotepadNext*.AppImage

  github:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    if: github.repository == 'dail8859/NotepadNext' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Create Draft Release
        run: |
          gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --generate-notes --draft

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Upload Windows Installer
        run: |
          gh release upload ${{ github.ref_name }} NotepadNext-Windows-Qt$QT_RELEASE_VER-Installer/NotepadNext-${{ github.ref_name }}-Installer.exe

      # The artifact is unzipped, so need to zip it back up so it can be uploaded
      - name: Upload Windows Zip
        run: |
          cd NotepadNext-Windows-Qt$QT_RELEASE_VER-Zip/
          zip -r ../NotepadNext-${{ github.ref_name }}-win64.zip .
          cd ..
          gh release upload ${{ github.ref_name }} NotepadNext-${{ github.ref_name }}-win64.zip

      - name: Upload Linux AppImage
        run: |
          gh release upload ${{ github.ref_name }} NotepadNext-Linux-Qt$QT_RELEASE_VER-AppImage/NotepadNext-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload macOS App (Intel x64)
        run: |
          gh release upload ${{ github.ref_name }} "NotepadNext-macOS-x64-Qt${QT_RELEASE_VER}/NotepadNext-${{ github.ref_name }}.dmg"

      - name: Upload macOS App (Apple Silicon arm64)
        run: |
          gh release upload ${{ github.ref_name }} "NotepadNext-macOS-arm64-Qt${QT_RELEASE_VER}/NotepadNext-${{ github.ref_name }}.dmg"
